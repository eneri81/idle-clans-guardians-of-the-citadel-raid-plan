<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guardians of the Citadel Raid Planner - Idle Clans</title>
  <link rel="icon" type="image/x-icon" href="files/favicon.png">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: files/;
    connect-src 'self' https://query.idleclans.com;
    object-src 'none';
    frame-ancestors 'none';
    base-uri 'self';">
  <style>
    /* =========================================
       1) Root Variables — Light Theme
    ========================================= */
    :root {
      --bg-color: #f5f5f5;
      --text-color: #2c3e50;
      --sidebar-bg: #2c3e50;
      --sidebar-text: #ecf0f1;
      --sidebar-hover: #34495e;
      --sidebar-button: #c0392b;
      --sidebar-button-hover: #a93226;
      --content-bg: #ffffff;
      --content-heading: #2c3e50;
      --input-border: #ccc;
      --input-bg: #fff;
      --table-header-bg: #f0f0f0;
      --table-border: #eee;
      --info-border: #3498db;
      --highlight-bg: #fffbdd;
      --shadow-color: rgba(0,0,0,0.1);
      --shadow-color-light: rgba(0,0,0,0.05);
      --warn-bg: #fff3cd;
      --warn-border: #e2a503;
      --warn-text: #856404;
      --danger-bg: #f8d7da;
      --danger-border: #dc3545;
      --danger-text: #721c24;
      --success-bg: #d4edda;
      --success-border: #28a745;
      --success-text: #155724;
      --info-bg-box: #d1ecf1;
      --info-border-box: #17a2b8;
      --info-text-box: #0c5460;
    }

    /* =========================================
       2) Dark Theme Overrides
    ========================================= */
    .dark-theme {
      --bg-color: #0f0f0f;
      --text-color: #e0e0e0;
      --sidebar-bg: #252525;
      --sidebar-text: #f0f0f0;
      --sidebar-hover: #333333;
      --sidebar-button: #bd3025;
      --sidebar-button-hover: #99251c;
      --content-bg: #1a1a1a;
      --content-heading: #ffffff;
      --input-bg: #333333;
      --input-border: #555;
      --table-header-bg: #2d2d2d;
      --table-border: #444;
      --info-border: #2980b9;
      --highlight-bg: #3a3a2a;
      --shadow-color: rgba(255,255,255,0.05);
      --shadow-color-light: rgba(255,255,255,0.03);
      --warn-bg: #3d3520;
      --warn-border: #e2a503;
      --warn-text: #ffc107;
      --danger-bg: #3d1f23;
      --danger-border: #dc3545;
      --danger-text: #f5a0a8;
      --success-bg: #1e3a24;
      --success-border: #28a745;
      --success-text: #81d89e;
      --info-bg-box: #1a2f35;
      --info-border-box: #17a2b8;
      --info-text-box: #7fdbec;
    }

    /* =========================================
       3) Global & Layout
    ========================================= */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
    }

    /* =========================================
       4) Header Bar
    ========================================= */
    .header-bar {
      display: flex;
      align-items: center;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 10px 20px;
      box-shadow: 0 2px 5px var(--shadow-color);
      position: relative;
    }
    .header-bar img {
      height: 50px;
      margin-right: 12px;
    }
    .header-bar h1 {
      font-size: 22px;
      margin: 0;
      flex-grow: 1;
      color: var(--content-heading);
    }

    /* =========================================
       5) Theme Toggle
    ========================================= */
    .theme-toggle {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 20px;
      display: flex;
      align-items: center;
      font-size: 14px;
      user-select: none;
    }
    .theme-toggle input { margin-right: 6px; cursor: pointer; }

    /* =========================================
       6) Content Wrapper
    ========================================= */
    .content-wrapper {
      display: flex;
      flex: 1;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      padding: 16px;
      box-shadow: 2px 0 8px var(--shadow-color);
      overflow-y: auto;
      min-height: 100%;
      flex-shrink: 0;
    }
    .sidebar h3 { margin-top: 0; margin-bottom: 12px; }
    .sidebar ul { list-style: none; padding-left: 0; margin: 0; }
    .sidebar li {
      margin-bottom: 8px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .sidebar li:hover { background: var(--sidebar-hover); }
    .sidebar button {
      background: var(--sidebar-button);
      color: #fff;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 4px;
    }
    .sidebar button:hover { background: var(--sidebar-button-hover); }

    /* Main container */
    .main-container {
      flex: 1;
      padding: 20px;
      background: var(--bg-color);
    }

    /* =========================================
       7) Player Input Card
    ========================================= */
    .player-inputs {
      max-width: 700px;
      margin: 0 auto 20px;
      background: var(--content-bg);
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 5px var(--shadow-color);
      transition: background 0.3s;
    }
    .player-inputs label { font-weight: bold; margin-right: 6px; }
    .player-inputs input[type="text"],
    .player-inputs select {
      padding: 6px;
      font-size: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-color);
      border-radius: 4px;
      transition: background 0.3s, color 0.3s;
    }
    .player-inputs button,
    .btn {
      margin-top: 8px;
      background: #2980b9;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    .player-inputs button:hover,
    .btn:hover { background: #1f6a91; }
    .clear-btn {
      margin-left: 8px;
      background: #7f8c8d;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #686d6e; }
    .clear-all-inputs-btn { margin-left: 16px; background: #8e44ad; }
    .clear-all-inputs-btn:hover { background: #7b378d; }

    .input-mode-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .input-mode-toggle button {
      padding: 6px 14px;
      border-radius: 4px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 14px;
      background: var(--table-header-bg);
      color: var(--text-color);
      transition: all 0.2s;
    }
    .input-mode-toggle button.active {
      border-color: #2980b9;
      background: #2980b9;
      color: #fff;
    }

    /* =========================================
       8) Alert Boxes
    ========================================= */
    .alert-box {
      padding: 12px 16px;
      margin-bottom: 14px;
      border-radius: 6px;
      border-left: 6px solid;
      line-height: 1.6;
    }
    .alert-danger {
      background: var(--danger-bg);
      border-left-color: var(--danger-border);
      color: var(--danger-text);
    }
    .alert-warn {
      background: var(--warn-bg);
      border-left-color: var(--warn-border);
      color: var(--warn-text);
    }
    .alert-success {
      background: var(--success-bg);
      border-left-color: var(--success-border);
      color: var(--success-text);
    }
    .alert-info {
      background: var(--info-bg-box);
      border-left-color: var(--info-border-box);
      color: var(--info-text-box);
    }

    /* =========================================
       9) Tables
    ========================================= */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: var(--content-bg);
      transition: background 0.3s;
    }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--table-border);
    }
    th {
      background: var(--table-header-bg);
      transition: background 0.3s;
      white-space: nowrap;
    }
    .skill-icon {
      width: 20px;
      height: 20px;
      vertical-align: middle;
      margin-right: 4px;
    }
    .highlight { background: var(--highlight-bg); }

    /* =========================================
       10) Results Section Cards
    ========================================= */
    .result-card {
      background: var(--content-bg);
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 5px var(--shadow-color);
      margin-bottom: 20px;
      transition: background 0.3s;
    }
    .result-card h2, .result-card h3 {
      color: var(--content-heading);
      margin-top: 0;
    }
    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      margin-right: 4px;
    }
    .badge-forager  { background: #27ae60; }
    .badge-woodcut  { background: #8B4513; }
    .badge-farming  { background: #f39c12; }
    .badge-brewing  { background: #8e44ad; }
    .badge-carpentry{ background: #d35400; }
    .badge-crafting { background: #2980b9; }

    .transition-table td { vertical-align: top; }

    .rank-num {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      text-align: center;
      line-height: 22px;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      margin-right: 6px;
    }
    .rank-1 { background: #f1c40f; color: #333; }
    .rank-2 { background: #95a5a6; }
    .rank-3 { background: #cd7f32; }
    .rank-other { background: #7f8c8d; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--table-border);
      border-top-color: #2980b9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =========================================
       11) Responsive
    ========================================= */
    @media (max-width: 768px) {
      .content-wrapper { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; }
    }
  </style>
</head>
<body>

  <!-- =================== HEADER =================== -->
  <div class="header-bar">
    <img src="files/Guardians_of_the_Citadel.png" alt="Guardians of the Citadel Logo" />
    <h1>Guardians of the Citadel Raid Planner — Idle Clans</h1>
    <div class="theme-toggle">
      <input type="checkbox" id="themeSwitch" />
      <label for="themeSwitch">Dark Mode</label>
    </div>
  </div>

  <!-- =================== BODY =================== -->
  <div class="content-wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Previously Used</h3>
      <ul id="historyList"></ul>
      <button id="clearHistoryBtn">Clear All Saved</button>
    </div>

    <!-- Main -->
    <div class="main-container">

      <!-- Input Card -->
      <div class="player-inputs" id="inputsBox">

        <!-- Mode Toggle -->
        <div class="input-mode-toggle">
          <button id="modePlayersBtn" class="active" onclick="setMode('players')">Enter Players</button>
          <button id="modeClanBtn" onclick="setMode('clan')">Enter Clan Name</button>
        </div>

        <!-- Players Mode -->
        <div id="playersModePanel">
          <div style="margin-bottom:8px;">
            <label>Your Username:</label>
            <input type="text" id="yourUsername" maxlength="20" />
            <button class="clear-btn" onclick="document.getElementById('yourUsername').value=''">Clear</button>
            <button class="clear-btn clear-all-inputs-btn" onclick="clearAllInputs()">Clear All</button>
          </div>
          <div>
            <label>Other players (1–5):</label>
            <select id="otherCountSelect">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div id="othersContainer" style="margin-top:10px;"></div>
          <button id="fetchPlayersBtn" onclick="fetchAllPlayers()">Fetch & Calculate</button>
        </div>

        <!-- Clan Mode -->
        <div id="clanModePanel" style="display:none;">
          <div style="margin-bottom:8px;">
            <label>Clan Name:</label>
            <input type="text" id="clanNameInput" maxlength="30" />
          </div>
          <div style="margin-bottom:8px;">
            <label>Team size (2–6):</label>
            <select id="clanTeamSize">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5" selected>5</option>
              <option value="6">6</option>
            </select>
          </div>
          <button onclick="fetchClan()">Fetch Clan & Recommend</button>
        </div>

      </div>

      <!-- Status -->
      <div id="statusArea"></div>

      <!-- Results -->
      <div id="resultsContainer"></div>
    </div>
  </div>

  <!-- =================== JAVASCRIPT =================== -->
  <script>
    "use strict";

    /* =============================================
       SKILL ICON PATH
    ============================================= */
    const ICON_PATH = "files/";
    const SKILL_KEYS = ["woodcutting","foraging","farming","brewing","carpentry","crafting"];

    function skillIcon(skill) {
      const file = skill.charAt(0).toUpperCase() + skill.slice(1).toLowerCase();
      return `<img class="skill-icon" src="${ICON_PATH}${file}.png" alt="${file}" title="${file}">`;
    }

    /* =============================================
       XP TABLE (from xp-table.csv)
    ============================================= */
    const LEVEL_XP = {
      1:0,2:75,3:151,4:227,5:303,6:380,7:531,8:683,9:836,
      10:988,11:1141,12:1294,13:1447,14:1751,15:2054,16:2358,
      17:2663,18:2967,19:3272,20:3577,21:4182,22:4788,23:5393,
      24:5999,25:6606,26:7212,27:7819,28:9026,29:10233,30:11441,
      31:12648,32:13856,33:15065,34:16273,35:18682,36:21091,
      37:23500,38:25910,39:28319,40:30729,41:33140,42:37950,
      43:42761,44:47572,45:52383,46:57195,47:62006,48:66818,
      49:76431,50:86043,51:95656,52:105269,53:114882,54:124496,
      55:134109,56:153323,57:172538,58:191752,59:210967,60:230182,
      61:249397,62:268613,63:307028,64:345444,65:383861,66:422277,
      67:460694,68:499111,69:537528,70:614346,71:691163,72:767981,
      73:844800,74:921618,75:998437,76:1075256,77:1228875,78:1382495,
      79:1536114,80:1689734,81:1843355,82:1996975,83:2150596,
      84:2457817,85:2765038,86:3072260,87:3379481,88:3686703,
      89:3993926,90:4301148,91:4915571,92:5529994,93:6144417,
      94:6758841,95:7373264,96:7987688,97:8602113,98:9830937,
      99:11059762,100:12288587,101:13517412,102:14746238,
      103:15975063,104:17203889,105:19661516,106:22119142,
      107:24576769,108:27034396,109:29492023,110:31949651,
      111:34407278,112:39322506,113:44237735,114:49152963,
      115:54068192,116:58983421,117:63898650,118:68813880,
      119:78644309,120:88474739
    };

    function getLevelFromXP(xp) {
      let level = 1;
      for (const lvl in LEVEL_XP) {
        if (xp >= LEVEL_XP[lvl]) level = parseInt(lvl);
        else break;
      }
      return level;
    }

    /* =============================================
       SANITIZE
    ============================================= */
    function sanitize(name) {
      return name.replace(/[^\w\s]/gi, "").trim().slice(0, 20);
    }

    /* =============================================
       HISTORY (localStorage)
    ============================================= */
    let userHistory = [];

    function loadHistory() {
      try {
        const s = localStorage.getItem("gotcHistory");
        if (s) { const p = JSON.parse(s); if (Array.isArray(p)) userHistory = p; }
      } catch(e) { userHistory = []; }
      const my = localStorage.getItem("gotcMyUser");
      if (my) document.getElementById("yourUsername").value = sanitize(my);
      renderHistory();
    }

    function saveHistory() {
      localStorage.setItem("gotcHistory", JSON.stringify(userHistory));
    }

    function renderHistory() {
      const ul = document.getElementById("historyList");
      ul.innerHTML = "";
      userHistory.forEach(n => {
        const li = document.createElement("li");
        li.textContent = n;
        li.addEventListener("click", () => fillHistoryName(n));
        ul.appendChild(li);
      });
    }

    function addHistory(name) {
      name = sanitize(name);
      if (name && !userHistory.includes(name)) {
        userHistory.push(name);
        saveHistory();
        renderHistory();
      }
    }

    function fillHistoryName(name) {
      const cnt = parseInt(document.getElementById("otherCountSelect").value) || 0;
      for (let i = 0; i < cnt; i++) {
        const f = document.getElementById("other" + i);
        if (f && !sanitize(f.value)) { f.value = sanitize(name); return; }
      }
    }

    document.getElementById("clearHistoryBtn").addEventListener("click", () => {
      localStorage.removeItem("gotcHistory");
      localStorage.removeItem("gotcMyUser");
      userHistory = [];
      renderHistory();
    });

    /* =============================================
       MODE TOGGLE
    ============================================= */
    let currentMode = "players";

    function setMode(mode) {
      currentMode = mode;
      document.getElementById("playersModePanel").style.display = mode === "players" ? "block" : "none";
      document.getElementById("clanModePanel").style.display    = mode === "clan"    ? "block" : "none";
      document.getElementById("modePlayersBtn").classList.toggle("active", mode === "players");
      document.getElementById("modeClanBtn").classList.toggle("active", mode === "clan");
    }

    /* =============================================
       GENERATE OTHER-PLAYER FIELDS
    ============================================= */
    function generateOtherFields() {
      const cnt = parseInt(document.getElementById("otherCountSelect").value) || 0;
      const box = document.getElementById("othersContainer");
      box.innerHTML = "";
      for (let i = 0; i < cnt; i++) {
        const d = document.createElement("div");
        d.style.marginBottom = "6px";
        d.innerHTML = `<label>Player ${i+2}:</label> <input type="text" id="other${i}" maxlength="20">`;
        box.appendChild(d);
      }
    }

    document.getElementById("otherCountSelect").addEventListener("change", generateOtherFields);
    generateOtherFields();

    function clearAllInputs() {
      document.getElementById("yourUsername").value = "";
      const cnt = parseInt(document.getElementById("otherCountSelect").value) || 0;
      for (let i = 0; i < cnt; i++) {
        const f = document.getElementById("other" + i);
        if (f) f.value = "";
      }
    }

    /* =============================================
       THEME TOGGLE
    ============================================= */
    document.getElementById("themeSwitch").addEventListener("change", function() {
      document.body.classList.toggle("dark-theme", this.checked);
      localStorage.setItem("gotcTheme", this.checked ? "dark" : "light");
    });
    if (localStorage.getItem("gotcTheme") === "dark") {
      document.body.classList.add("dark-theme");
      document.getElementById("themeSwitch").checked = true;
    }

    /* =============================================
       STATUS HELPER
    ============================================= */
    function setStatus(html) {
      document.getElementById("statusArea").innerHTML = html;
    }

    /* =============================================
       API: FETCH PLAYER PROFILE
    ============================================= */
    async function fetchPlayerProfile(name) {
      const url = `https://query.idleclans.com/api/Player/profile/${encodeURIComponent(name)}`;
      const resp = await fetch(url);
      if (!resp.ok) {
        if (resp.status === 404) throw new Error(`Player "${name}" not found.`);
        throw new Error(`HTTP ${resp.status} for "${name}".`);
      }
      const data = await resp.json();

      // skillExperiences may be a JSON string or object
      let xpObj = data.skillExperiences;
      if (typeof xpObj === "string") {
        try { xpObj = JSON.parse(xpObj); } catch(e) { xpObj = {}; }
      }
      if (!xpObj || typeof xpObj !== "object") xpObj = {};

      // Extract levels for our 6 skills (try various casings)
      const levels = {};
      SKILL_KEYS.forEach(sk => {
        const variants = [
          sk,
          sk.charAt(0).toUpperCase() + sk.slice(1),
          sk.toUpperCase()
        ];
        let xp = 0;
        for (const v of variants) {
          if (xpObj[v] !== undefined) { xp = Number(xpObj[v]) || 0; break; }
        }
        levels[sk] = getLevelFromXP(xp);
      });

      return { username: data.username || name, levels };
    }

    /* =============================================
       API: FETCH CLAN MEMBERS, THEN PROFILES
    ============================================= */
    async function fetchClanMembers(clanName) {
      const url = `https://query.idleclans.com/api/Clan/${encodeURIComponent(clanName)}/experience`;
      const resp = await fetch(url);
      if (!resp.ok) {
        if (resp.status === 404) throw new Error(`Clan "${clanName}" not found.`);
        throw new Error(`HTTP ${resp.status} for clan "${clanName}".`);
      }
      const data = await resp.json();
      // Extract player names from playerContributions
      if (data.playerContributions && Array.isArray(data.playerContributions)) {
        return data.playerContributions.map(pc => pc.username).filter(Boolean);
      }
      throw new Error("Could not parse clan member list.");
    }

    /* =============================================
       FETCH ALL (Players Mode)
    ============================================= */
    async function fetchAllPlayers() {
      const you = sanitize(document.getElementById("yourUsername").value);
      if (!you) { alert("Please enter your username."); return; }

      localStorage.setItem("gotcMyUser", you);
      const cnt = parseInt(document.getElementById("otherCountSelect").value) || 0;
      const names = [you];
      for (let i = 0; i < cnt; i++) {
        const n = sanitize((document.getElementById("other" + i) || {}).value || "");
        if (!n) { alert(`Enter username for Player ${i+2}.`); return; }
        names.push(n);
      }
      if (names.length < 2 || names.length > 6) {
        alert("Need 2–6 players."); return;
      }

      setStatus(`<span class="spinner"></span> Fetching ${names.length} player profiles…`);
      try {
        const players = [];
        for (const nm of names) {
          const p = await fetchPlayerProfile(nm);
          players.push(p);
          addHistory(nm);
        }
        setStatus("");
        processAndDisplay(players);
      } catch(err) {
        setStatus(`<div class="alert-box alert-danger">Error: ${err.message}</div>`);
      }
    }

    /* =============================================
       FETCH CLAN
    ============================================= */
    async function fetchClan() {
      const clan = sanitize(document.getElementById("clanNameInput").value);
      if (!clan) { alert("Enter a clan name."); return; }
      const teamSize = parseInt(document.getElementById("clanTeamSize").value) || 5;

      setStatus(`<span class="spinner"></span> Fetching clan "${clan}" members…`);
      try {
        const memberNames = await fetchClanMembers(clan);
        if (memberNames.length === 0) throw new Error("No members found.");

        setStatus(`<span class="spinner"></span> Fetching ${memberNames.length} profiles…`);
        const allPlayers = [];
        for (const nm of memberNames) {
          try {
            const p = await fetchPlayerProfile(nm);
            allPlayers.push(p);
          } catch(e) {
            console.warn(`Skipping ${nm}: ${e.message}`);
          }
        }
        if (allPlayers.length < 2) throw new Error("Fewer than 2 valid profiles found.");

        // Rank players by sum of all 6 skills, pick top N
        allPlayers.sort((a, b) => {
          const sumA = SKILL_KEYS.reduce((s, k) => s + a.levels[k], 0);
          const sumB = SKILL_KEYS.reduce((s, k) => s + b.levels[k], 0);
          return sumB - sumA;
        });

        const selected = allPlayers.slice(0, Math.min(teamSize, 6));
        setStatus("");
        processAndDisplay(selected);
      } catch(err) {
        setStatus(`<div class="alert-box alert-danger">Error: ${err.message}</div>`);
      }
    }

    /* =============================================
       CORE LOGIC: PROCESS & DISPLAY
    ============================================= */
    function processAndDisplay(players) {
      const container = document.getElementById("resultsContainer");
      container.innerHTML = "";

      // ---- 1. Warnings ----
      const warnings = generateWarnings(players);
      if (warnings.length) {
        const wDiv = document.createElement("div");
        wDiv.innerHTML = warnings.join("");
        container.appendChild(wDiv);
      }

      // ---- 2. Skill Overview Table ----
      container.innerHTML += buildSkillTable(players);

      // ---- 3. Role Assignments ----
      const roles = assignRoles(players);
      container.innerHTML += buildRoleSummary(roles, players);

      // ---- 4. Transition Plan ----
      container.innerHTML += buildTransitionPlan(roles, players);

      // ---- 5. Ranked Lists ----
      container.innerHTML += buildRankedLists(players);

    }

    /* =============================================
       WARNINGS
    ============================================= */
    function generateWarnings(players) {
      const msgs = [];

      // Check: all players < 75 in most skills
      const allBelow75 = players.every(p => {
        const belowCount = SKILL_KEYS.filter(k => p.levels[k] < 75).length;
        return belowCount >= 4; // "most" = 4+ of 6
      });
      if (allBelow75) {
        msgs.push(`<div class="alert-box alert-danger">
          <strong>⛔ Critical — Very Low Team Skill Levels</strong><br>
          All players are below level 75 in most raid skills. The Guardians of the Citadel raid
          requires efficient gathering, farming, brewing, and construction. Below level 75, action
          speed is significantly slower than baseline, meaning your team will likely run out of time
          before producing enough potions and defenses to survive the enemy waves.<br><br>
          <strong>Recommendation:</strong> Focus on leveling Woodcutting, Foraging, Farming, Brewing,
          Carpentry, and Crafting to at least 75 before attempting this raid.
        </div>`);
      }

      // Check each player: all skills < 50
      players.forEach(p => {
        const allBelow50 = SKILL_KEYS.every(k => p.levels[k] < 50);
        if (allBelow50) {
          msgs.push(`<div class="alert-box alert-danger">
            <strong>⛔ ${p.username} — All Skills Below 50</strong><br>
            This player has every relevant raid skill below level 50. At these levels, gathering
            and production speeds are extremely slow — roughly half the output of a level-70 player.
            Their contribution would be negligible and could hold the team back.<br><br>
            <strong>Recommendation:</strong> ${p.username} should not yet participate in this raid.
            Prioritize leveling at least 2–3 raid skills (especially Woodcutting or Foraging) to
            50+ before joining.
          </div>`);
          return;
        }

        // Check each player: all skills < 70
        const allBelow70 = SKILL_KEYS.every(k => p.levels[k] < 70);
        if (allBelow70) {
          msgs.push(`<div class="alert-box alert-warn">
            <strong>⚠ ${p.username} — All Skills Below 70</strong><br>
            Every raid skill for this player is below the level-70 baseline speed. They can
            participate if there is space on the team, but their contribution will be noticeably
            lower. Every 5 levels below 70 reduces action speed proportionally, so they will
            produce fewer materials, potions, and structures in each phase.<br><br>
            <strong>Tip:</strong> Assign them to their highest skill to minimize the impact.
          </div>`);
        }
      });

      // Check: all players < 90 in both Woodcutting AND Foraging
      const noWC90  = players.every(p => p.levels.woodcutting < 90);
      const noFor90 = players.every(p => p.levels.foraging < 90);
      if (noWC90 && noFor90) {
        msgs.push(`<div class="alert-box alert-warn">
          <strong>⚠ No 90+ Woodcutter or Forager</strong><br>
          None of your team members have Woodcutting or Foraging at level 90 or above.
          At 90+, these skills unlock higher-tier materials and significantly faster gathering
          speeds. Without a high-level gatherer, your team will collect lower-quality wood and
          seeds, which translates to weaker potions (Brewing), weaker defenses (Carpentry),
          and weaker weapons (Crafting).<br><br>
          <strong>Your team can still attempt the raid</strong> if other skills (Farming, Brewing,
          Carpentry, Crafting) are strong, but expect reduced output quality. Ideally, at least
          one player should have 90+ in Woodcutting or Foraging.
        </div>`);
      }

      return msgs;
    }

    /* =============================================
       SKILL TABLE
    ============================================= */
    function buildSkillTable(players) {
      let html = `<div class="result-card"><h2>Skill Overview</h2><table><thead><tr>
        <th>Player</th>
        <th>${skillIcon("woodcutting")} Cut</th>
        <th>${skillIcon("foraging")} Foraging</th>
        <th>${skillIcon("farming")} Farming</th>
        <th>${skillIcon("brewing")} Brewing</th>
        <th>${skillIcon("carpentry")} Carpentry</th>
        <th>${skillIcon("crafting")} Crafting</th>
      </tr></thead><tbody>`;

      players.forEach(p => {
        html += `<tr>
          <td><strong>${esc(p.username)}</strong></td>`;
        SKILL_KEYS.forEach(sk => {
          const lv = p.levels[sk];
          const cls = lv >= 90 ? "highlight" : "";
          html += `<td class="${cls}">${lv}</td>`;
        });
        html += `</tr>`;
      });

      html += `</tbody></table></div>`;
      return html;
    }

    /* =============================================
       ROLE ASSIGNMENT LOGIC
    ============================================= */
    function assignRoles(players) {
      const result = {
        forager: null,
        woodcutters: [],
        farmers: [],
        brewers: [],
        carpenters: [],
        crafters: []
      };

      const pool = players.map(p => p.username);

      // 1) Forager — highest foraging, prefer >90
      const sortedForage = [...players].sort((a, b) => b.levels.foraging - a.levels.foraging);
      result.forager = sortedForage[0].username;

      // 2) Woodcutters — 1-2 players, from remaining
      const wcCandidates = [...players]
        .filter(p => p.username !== result.forager)
        .sort((a, b) => b.levels.woodcutting - a.levels.woodcutting);

      const above90WC = wcCandidates.filter(p => p.levels.woodcutting >= 90);
      if (above90WC.length >= 2) {
        result.woodcutters = [above90WC[0].username, above90WC[1].username];
      } else if (above90WC.length === 1) {
        result.woodcutters = [above90WC[0].username];
      } else if (wcCandidates.length >= 1) {
        // Pick top 1 (or 2 if 4+ players left)
        result.woodcutters = [wcCandidates[0].username];
        if (players.length >= 4 && wcCandidates.length >= 2) {
          result.woodcutters.push(wcCandidates[1].username);
        }
      }

      // 3) Rank all players for farming, brewing, carpentry, crafting
      result.farmers    = [...players].sort((a, b) => b.levels.farming - a.levels.farming).map(p => p.username);
      result.brewers    = [...players].sort((a, b) => b.levels.brewing - a.levels.brewing).map(p => p.username);
      result.carpenters = [...players].sort((a, b) => b.levels.carpentry - a.levels.carpentry).map(p => p.username);
      result.crafters   = [...players].sort((a, b) => b.levels.crafting - a.levels.crafting).map(p => p.username);

      return result;
    }

    /* =============================================
       ROLE SUMMARY
    ============================================= */
    function buildRoleSummary(roles, players) {
      const pMap = {};
      players.forEach(p => pMap[p.username] = p);

      const foragerLvl = pMap[roles.forager].levels.foraging;
      let html = `<div class="result-card"><h2>Raid Setup Summary</h2>`;

      html += `<h3>Primary Assignments</h3>`;
      html += `<table><tbody>`;
      html += `<tr><td><span class="role-badge badge-forager">Forager</span></td>
               <td><strong>${esc(roles.forager)}</strong></td>
               <td>${skillIcon("foraging")} ${foragerLvl}</td></tr>`;

      roles.woodcutters.forEach(wc => {
        const lv = pMap[wc].levels.woodcutting;
        html += `<tr><td><span class="role-badge badge-woodcut">Woodcutting</span></td>
                 <td><strong>${esc(wc)}</strong></td>
                 <td>${skillIcon("woodcutting")} ${lv}</td></tr>`;
      });
      html += `</tbody></table>`;

      // Early phase: farming & brewing (exclude woodcutters)
      const nonWC = players.filter(p => !roles.woodcutters.includes(p.username));
      const earlyFarmer = [...nonWC].sort((a, b) => b.levels.farming - a.levels.farming)[0];
      const earlyBrewer = [...nonWC].sort((a, b) => b.levels.brewing - a.levels.brewing)[0];

      html += `<h3>Early Phase Roles</h3>`;
      html += `<table><tbody>`;
      if (earlyFarmer) {
        html += `<tr><td><span class="role-badge badge-farming">Farming</span></td>
                 <td><strong>${esc(earlyFarmer.username)}</strong></td>
                 <td>${skillIcon("farming")} ${earlyFarmer.levels.farming}</td></tr>`;
      }
      if (earlyBrewer) {
        html += `<tr><td><span class="role-badge badge-brewing">Brewing</span></td>
                 <td><strong>${esc(earlyBrewer.username)}</strong></td>
                 <td>${skillIcon("brewing")} ${earlyBrewer.levels.brewing}</td></tr>`;
      }
      html += `</tbody></table>`;

      html += `</div>`;
      return html;
    }


    /* =============================================
       RANKED LISTS
    ============================================= */
    function buildRankedLists(players) {
      let html = `<div class="result-card"><h2>Combat Prep Roles — Full Rankings</h2>`;
      const skills = [
        { key: "carpentry", label: "Carpentry", badge: "badge-carpentry", note: "Defense boost" },
        { key: "crafting",  label: "Crafting",  badge: "badge-crafting",  note: "Attack boost" },
        { key: "woodcutting", label: "Woodcutting", badge: "badge-woodcut", note: "Material resupply" }
      ];

      skills.forEach(sk => {
        const sorted = [...players].sort((a, b) => b.levels[sk.key] - a.levels[sk.key]);
        html += `<h3>${skillIcon(sk.key)} ${sk.label} <small style="font-weight:normal;color:var(--text-color);opacity:0.7;">(${sk.note})</small></h3>`;
        html += `<table><thead><tr><th>#</th><th>Player</th><th>Level</th></tr></thead><tbody>`;
        sorted.forEach((p, i) => {
          const rc = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "rank-other";
          html += `<tr>
            <td><span class="rank-num ${rc}">${i+1}</span></td>
            <td>${esc(p.username)}</td>
            <td>${p.levels[sk.key]}</td>
          </tr>`;
        });
        html += `</tbody></table>`;
      });

      html += `</div>`;
      return html;
    }

	/* =============================================
	   WOODCUTTING SUPPORT CANDIDATES
	============================================= */
	function getWoodcuttingSupport(roles, players) {
	  const wcSet = new Set(roles.woodcutters);
	  const count = players.length;
	
	  // How many WC support slots based on party size
	  let supportSlots = 0;
	  if (count >= 5) supportSlots = 2;
	  else if (count >= 3) supportSlots = 1;
	  // 2-player parties: no support needed, WC is already assigned
	
	  // Filter out primary woodcutters, then sort by woodcutting level desc
	  const candidates = players
		.filter(p => !wcSet.has(p.username))
		.sort((a, b) => b.levels.woodcutting - a.levels.woodcutting);
	
	  // Take top N
	  const supportNames = new Set(
		candidates.slice(0, supportSlots).map(c => c.username)
	  );
	
	  return supportNames; // Set of usernames
	}


    /* =============================================
       TRANSITION PLAN
    ============================================= */
    function buildTransitionPlan(roles, players) {
      const pMap = {};
      const wcSupportSet = getWoodcuttingSupport(roles, players);
      players.forEach(p => pMap[p.username] = p);

      let html = `<div class="result-card"><h2>Transition Plan</h2>`;
      html += `<div class="alert-box alert-info">
        <strong>Phase 1 (Preparation):</strong> Forager collects seeds → Farmer plants → Brewer makes potions.
        Woodcutters gather logs throughout.<br>
        <strong>Phase 2 (Combat Prep):</strong> Once potions are brewed, Farming/Brewing players
        transition to Carpentry (defense) and Crafting (attack).
      </div>`;

      html += `<table class="transition-table"><thead><tr>
        <th>Player</th><th>Phase 1 Role</th><th>Phase 2 Transition</th><th>Woodcutting Support</th><th>Reason</th>
      </tr></thead><tbody>`;

      // Determine each player's phase 1 + phase 2
      const foragerName = roles.forager;
      const wcSet = new Set(roles.woodcutters);

      // Non-WC players sorted by farming for early assignment
      const nonWC = players.filter(p => !wcSet.has(p.username));
      const earlyFarmer = [...nonWC].sort((a, b) => b.levels.farming - a.levels.farming)[0];
      const earlyBrewer = [...nonWC].sort((a, b) => b.levels.brewing - a.levels.brewing)[0];

      players.forEach(p => {
        let phase1 = "";
        let phase2 = "";
        let woodcuttingSupport = "";
        let reason = "";

        if (wcSet.has(p.username)) {
          phase1 = `<span class="role-badge badge-woodcut">Woodcutting (${p.levels.woodcutting})</span>`;
          phase2 = `<span class="role-badge badge-woodcut">Continue Woodcutting</span>`;
          reason = "Woodcutters supply materials throughout both phases. Stay on logs.";
        } else if (p.username === foragerName) {
          phase1 = `<span class="role-badge badge-forager">Foraging (${p.levels.foraging})</span>`;
          // Best secondary
          phase2 = buildPhase2Badges(p);
          reason = `After seed collection, transitions to Carpentry/Crafting for combat prep.`;
        } else if (earlyFarmer && p.username === earlyFarmer.username) {
          phase1 = `<span class="role-badge badge-farming">Farming (${p.levels.farming})</span>`;
          phase2 = buildPhase2Badges(p);
          reason = `Once crops are planted, transitions to Carpentry/Crafting for combat prep.`;
        } else if (earlyBrewer && p.username === earlyBrewer.username) {
          phase1 = `<span class="role-badge badge-brewing">Brewing (${p.levels.brewing})</span>`;
          phase2 = buildPhase2Badges(p);
          reason = `Once potions are brewed, transitions to Carpentry/Crafting for combat prep.`;
        } else {
          // Remaining players — assign best of carpentry/crafting
          const best = getBestSecondary(p, ["carpentry", "crafting", "farming", "brewing"]);
          phase1 = `<span class="role-badge badge-${best}">` +
                   best.charAt(0).toUpperCase() + best.slice(1) + ` (${p.levels[best]})</span>`;
          phase2 = buildPhase2Badges(p);
          reason = `Flexible role — contributes where needed.`;
        }
		
		// Determine woodcutting support label
		if (!wcSet.has(p.username) && wcSupportSet.has(p.username)) {
		  woodcuttingSupport = `<span class="role-badge badge-woodcut">Woodcutting (${p.levels.woodcutting})</span>`;
		}

        html += `<tr>
          <td><strong>${esc(p.username)}</strong></td>
          <td>${phase1}</td>
          <td>${phase2}</td>
          <td>${woodcuttingSupport}</td>
          <td>${reason}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      return html;
    }

    function getBestSecondary(player, skillList) {
      let best = skillList[0];
      let bestLvl = player.levels[skillList[0]] || 0;
      skillList.forEach(sk => {
        if ((player.levels[sk] || 0) > bestLvl) {
          bestLvl = player.levels[sk];
          best = sk;
        }
      });
      return best;
    }

	function buildPhase2Badges(player) {
	  const skills = [
		{ key: "carpentry", label: "Carpentry", badge: "badge-carpentry" },
		{ key: "crafting",  label: "Crafting",  badge: "badge-crafting"  }
	  ];
	  // Sort descending by level
	  skills.sort((a, b) => (player.levels[b.key] || 0) - (player.levels[a.key] || 0));
	  return skills.map(s =>
		`<span class="role-badge ${s.badge}">${s.label} (${player.levels[s.key]})</span>`
	  ).join(" ");
	}

    /* =============================================
       HTML ESCAPE
    ============================================= */
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    /* =============================================
       INIT
    ============================================= */
    loadHistory();
  </script>
</body>
</html>
